<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สถิติจำนวนนักเรียน</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#f4f6f9;
    font-family: Arial, sans-serif;
}

/* จัดให้อยู่กลางทั้งแนวตั้งและแนวนอน */
#chart{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* กล่อง */
.card{
    width:90%;
    max-width:900px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    display:flex;
    justify-content:center;   /* สำคัญ */
}

/* iframe จัดกลาง */
iframe{
    width:100%;
    max-width:800px;
    height:450px;
    border:none;
}
</style>
</head>

<body>

<section id="chart">
<h2>สถิติจำนวนนักเรียน</h2>

<div class="card">
<iframe 
src="">
</iframe>
</div>

</section>

</body>
</html>
